name: opam
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-24.04
        ocaml-version:
          - "5.3"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Use OCaml ${{ matrix.ocaml-version }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-version }}
      - name: Build
        run: dune build
      - name: Run Ulrik
        run: dune exec ulrik library/book.anders
      - name: Run Mike
        run: dune exec mike library/book.anders
